<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiK Store - Change Password</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="css/admin_page/auth-pages.css">
</head>
<body class="auth-page-body">
    <main class="auth-page">
        <h1>Change Password</h1>
        <p id="error"></p>
        <p id="message"></p>
        <form id="changePasswordForm" class="auth-form">
            <div class="form-row">
                <label for="currentPassword">Current Password</label>
                <input id="currentPassword" name="currentPassword" type="password" required>
            </div>
            <div class="form-row">
                <label for="newPassword">New Password</label>
                <input id="newPassword" name="newPassword" type="password" minlength="8" required>
            </div>
            <div class="form-row">
                <label for="confirmNewPassword">Confirm New Password</label>
                <input id="confirmNewPassword" name="confirmNewPassword" type="password" minlength="8" required>
            </div>
            <button type="submit">Change Password</button>
        </form>
        <div class="auth-footer">
            <p><a href="/home.html">Back to Home</a></p>
        </div>
    </main>
    <script src="js/csrf.js"></script>
    <script src="js/change-password.js"></script>
</body>
</html>
